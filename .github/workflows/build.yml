name: Build Kindle Adapter Cross Multi-Platform Arch

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TARGET_DIR: ./target
  WEB_DIR: ./web
  BIN1_NAME: kindle_adapter
  BIN2_NAME: kindle_adapter_webui

jobs:
  cross-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            feature: windows
            ext: .exe
            archive: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            feature: windows
            ext: .exe
            archive: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            feature: linux
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            feature: linux
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            feature: linux
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            feature: linux
            ext: ".exe"
            archive: zip
        # target:
        #   - x86_64-pc-windows-gnu
        #   - x86_64-unknown-linux-gnu
        #   - aarch64-unknown-linux-gnu
        #   - armv7-unknown-linux-gnueabihf
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Setup Rust & Cross
        uses: dtolnay/rust-toolchain@stable

      # - name: Install cross
      #   run: cargo install cross --force
        
      - name: Cache cross docker images
        uses: actions/cache@v4
        with:
          path: ~/.cross
          key: cross-docker-${{ matrix.target }}

      - name: Build with cross
        if: startsWith(matrix.os, 'ubuntu')
        uses: taiki-e/install-action@cross
        with:
          tool: cross
        run: |
          if [[ "${{ matrix.target }}" == *linux* ]]; then
            cross build --release --target ${{ matrix.target }} --features linux
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Cargo build Windows
        if: startsWith(matrix.os, 'windows')
        run: cargo build --release --target ${{ matrix.target }} --features=${{ matrix.feature }}

      - name: Prepare package files
        run: |
          OUTPUT_DIR=./kindle_adapter_${{ matrix.target }}
          mkdir -p $OUTPUT_DIR
          BIN_OUT=${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release

          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp $BIN_OUT/${{ env.BIN1_NAME }}.exe $OUTPUT_DIR/
            cp $BIN_OUT/${{ env.BIN2_NAME }}.exe $OUTPUT_DIR/
          else
            cp $BIN_OUT/${{ env.BIN1_NAME }} $OUTPUT_DIR/
            cp $BIN_OUT/${{ env.BIN2_NAME }} $OUTPUT_DIR/
          fi

          cp -r ${{ env.WEB_DIR }} $OUTPUT_DIR/

      - name: Archive release package
        id: archive
        run: |
          TARGET=${{ matrix.target }}
          PKG_NAME=kindle_adapter_${TARGET}
          OUT_DIR=./kindle_adapter_$TARGET
          if [[ "$TARGET" == *windows* ]]; then
            zip -r ${PKG_NAME}.zip $OUT_DIR
            echo "ARTIFACT_FILE=${PKG_NAME}.zip" >> $GITHUB_ENV
          else
            tar -zcvf ${PKG_NAME}.tar.gz $OUT_DIR
            echo "ARTIFACT_FILE=${PKG_NAME}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_FILE }}
          path: ${{ env.ARTIFACT_FILE }}

  mac-build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust + install mac target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare package
        run: |
          OUTPUT_DIR=./kindle_adapter_${{ matrix.target }}
          mkdir -p $OUTPUT_DIR
          BIN_OUT=${{ env.CARGO_TARGET_DIR }}/${{ matrix.target }}/release
          cp $BIN_OUT/${{ env.BIN1_NAME }} $OUTPUT_DIR/
          cp $BIN_OUT/${{ env.BIN2_NAME }} $OUTPUT_DIR/
          cp -r ${{ env.WEB_DIR }} $OUTPUT_DIR/

      - name: Archive tar.gz
        run: |
          PKG_NAME=kindle_adapter_${{ matrix.target }}
          tar -zcvf ${PKG_NAME}.tar.gz ${PKG_NAME}
          echo "ARTIFACT=${PKG_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

  release:
    needs: [cross-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            *.zip
            *.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
