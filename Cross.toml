[target.x86_64-unknown-linux-gnu]
pre-build = ["apt-get update && apt-get install -y libssl-dev pkg-config xorg-dev libevdev-dev libudev-dev"]

[target.aarch64-unknown-linux-gnu]
pre-build = [
  "dpkg --add-architecture arm64 && apt-get update -y",
  "apt-get install -y git:arm64 python3:arm64 python3-dev:arm64 make:arm64 autoconf:arm64 automake:arm64 libtool:arm64",
  "apt-get install -y libssl-dev:arm64 libx11-dev:arm64 libxi-dev:arm64 libevdev-dev:arm64 libudev-dev:arm64",
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
  "dpkg --add-architecture armhf && apt-get update -y",
  "apt-get install -y git python3 python3-dev pkg-config make autoconf automake libtool",
  "apt-get install -y libssl-dev:armhf libx11-dev:armhf libxext-dev:armhf libxi-dev:armhf libevdev-dev:armhf libudev-dev:armhf",
]
