[target.x86_64-unknown-linux-gnu]
pre-build = ["apt-get update && apt-get install -y libssl-dev pkg-config xorg-dev libevdev-dev libudev-dev"]

[target.aarch64-unknown-linux-gnu]
pre-build = ["apt-get update && apt-get install -y libssl-dev:arm64 pkg-config:arm64 xorg-dev:arm64 libevdev-dev:arm64 libudev-dev:arm64"]

[target.armv7-unknown-linux-gnueabihf]
pre-build = ["dpkg --add-architecture armhf && apt-get update && apt-get install -y libssl-dev:armhf pkg-config:armhf xorg-dev:armhf libevdev-dev:armhf libudev-dev:armhf"]
